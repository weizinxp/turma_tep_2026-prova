  <p style="font-size:.9rem; margin-bottom:12px;">
    Qual é a diferença entre <strong>git merge</strong> e <strong>git rebase</strong>?
    Descreva o que cada comando faz e em qual situação você preferiria usar cada um.
  </p>
  <textarea readonly>O git merge combina mudanças de duas branches criando um novo commit de merge, preservando o histórico de ambas. O git rebase aplica as mudanças de uma branch em outra, reescrevendo o histórico para uma linha do tempo mais linear. Preferiria usar merge para preservar o histórico original e rebase para manter um histórico mais limpo antes de uma integração final.</textarea>
